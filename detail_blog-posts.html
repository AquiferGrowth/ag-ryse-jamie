  <script>
(function () {
  // ---- CONFIG ----
  const WPM = 220;
  const INCLUDE_IMAGE_TIME = true;
  // Your list wrappers
  const LIST_SELECTORS = [
      '.related-blog-list'
  ];
  const ITEM_SELECTOR   = '.w-dyn-item';
  const OUTPUT_SELECTOR = '.card-read-time';
  // Link Block candidates (Webflow)
  const LINK_CANDIDATES = [
    '[data-readtime-link][href]',
    '.w-inline-block[href]',
    '.card-title a[href]',
    'a[href]' // last resort
  ];
  const TIMEOUT_MS = 8000;
  // ---- HELPERS ----
  function secondsFromEl(el) {
    const words = el.innerText.trim().split(/\s+/).filter(Boolean).length;
    let imgSec = 0;
    if (INCLUDE_IMAGE_TIME) {
      const n = el.querySelectorAll('img').length;
      for (let i = 1; i <= n; i++) imgSec += Math.max(3, 12 - (i - 1));
    }
    return Math.ceil((words / Math.max(WPM, 1)) * 60) + imgSec;
  }
  function label(sec) { return `${Math.max(1, Math.round(sec / 60))} min read`; }
  function setOut(el, sec) { if (el) el.textContent = label(sec); }
  function getCacheKey(url) {
    return `readtime::${new URL(url, location.origin).href}`;
  }
  function readCache(url) {
    try {
      const raw = sessionStorage.getItem(getCacheKey(url));
      if (!raw) return null;
      const { sec, ts } = JSON.parse(raw);
      if (Date.now() - ts > 24 * 60 * 60 * 1000) return null; // 24h TTL
      return sec;
    } catch { return null; }
  }
  function writeCache(url, sec) {
    try { sessionStorage.setItem(getCacheKey(url), JSON.stringify({ sec, ts: Date.now() })); } catch {}
  }
  function sameOrigin(url) {
    try { return new URL(url, location.origin).origin === location.origin; }
    catch { return false; }
  }
  async function fetchDoc(url, timeout = TIMEOUT_MS) {
    const ctrl = new AbortController();
    const id = setTimeout(() => ctrl.abort(), timeout);
    try {
      const res = await fetch(url, { credentials: 'same-origin', signal: ctrl.signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const html = await res.text();
      return new DOMParser().parseFromString(html, 'text/html');
    } finally { clearTimeout(id); }
  }
  function findLinkURL(item) {
    for (const sel of LINK_CANDIDATES) {
      const a = item.querySelector(sel);
      if (a && a.href) return a.href;
    }
    return null;
  }
  // ---- MAIN ----
  const lists = LIST_SELECTORS.flatMap(sel => Array.from(document.querySelectorAll(sel)));
  if (!lists.length) return;
  const inflight = new Map(); // url -> Promise<number>
  function computeForUrl(url) {
    const cached = readCache(url);
    if (cached != null) return Promise.resolve(cached);
    if (inflight.has(url)) return inflight.get(url);
    const p = (async () => {
      try {
        const doc = await fetchDoc(url);
        const body = doc.querySelector('.post-body'); // change if your article body uses a different class
        if (!body) throw new Error('No .post-body');
        const sec = secondsFromEl(body);
        writeCache(url, sec);
        return sec;
      } finally { inflight.delete(url); }
    })();
    inflight.set(url, p);
    return p;
  }
  function processItem(item) {
    const outEl = item.querySelector(OUTPUT_SELECTOR);
    if (!outEl) return;
    const url = findLinkURL(item);
    if (!url || !sameOrigin(url)) { outEl.textContent = ''; return; }
    const cached = readCache(url);
    if (cached != null) { setOut(outEl, cached); return; }
    outEl.textContent = '…'; // tiny placeholder
    computeForUrl(url).then(
      sec => setOut(outEl, sec),
      () => { outEl.textContent = ''; } // silent fail if fetch blocked
    );
  }
  // Initial scan
  lists.forEach(list => list.querySelectorAll(ITEM_SELECTOR).forEach(processItem));
  // Observe dynamically injected cards (tabs/sliders/AJAX)
  const mo = new MutationObserver(muts => {
    muts.forEach(m => {
      m.addedNodes?.forEach(node => {
        if (!(node instanceof HTMLElement)) return;
        if (node.matches?.(ITEM_SELECTOR)) processItem(node);
        node.querySelectorAll?.(ITEM_SELECTOR).forEach(processItem);
      });
    });
  });
  mo.observe(document.body, { childList: true, subtree: true });
})();
</script>
